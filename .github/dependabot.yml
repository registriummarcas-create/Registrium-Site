version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Fortaleza"
    open-pull-requests-limit: 2
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
