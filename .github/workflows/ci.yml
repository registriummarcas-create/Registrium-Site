name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Ativar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.15.1 --activate
      - name: Instalar dependências
        run: pnpm install --no-frozen-lockfile
      - name: Validar
        run: pnpm check
