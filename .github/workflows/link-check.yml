name: Link check

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * 1"
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "scripts/check-links.mjs"

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-links.mjs
